name: Daily Inspiration Email

on:
  # Every morning at 8:00 AM ET (EDT = UTC-4, so 12:00 UTC)
  # Note: April–June is always EDT, so 12:00 UTC is correct for the full goal period.
  schedule:
    - cron: '0 12 * * *'

  # Manual trigger — useful for testing
  workflow_dispatch: {}

jobs:
  send-inspiration:
    name: Generate and Send Daily Inspiration
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily inspiration email
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          INSPIRATION_RECIPIENT_EMAIL: ${{ secrets.INSPIRATION_RECIPIENT_EMAIL }}
        run: python -m daily_inspiration.main
