name: Daily Meeting Brief

# When does this run?
on:
  schedule:
    - cron: '0 23 * * 0-4'

  workflow_dispatch:
    inputs:
      save_local_copy:
        description: 'Save HTML output as an artifact (for debugging)'
        required: false
        default: 'false'
        type: boolean

jobs:
  send-daily-brief:
    name: Generate and Send Daily Brief
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send Daily Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          BRIEF_RECIPIENT_EMAIL: ${{ secrets.BRIEF_RECIPIENT_EMAIL }}
          GRANOLA_NOTES_DIR: ''
          SAVE_LOCAL_COPY: ${{ inputs.save_local_copy || 'false' }}
        run: python -m daily_brief.main

      - name: Upload brief HTML (debug artifact)
        if: ${{ inputs.save_local_copy == true }}
        uses: actions/upload-artifact@v4
        with:
          name: daily-brief-output
          path: brief_output.html
          retention-days: 7
